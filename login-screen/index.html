<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cogie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container">
        <div class="login-card animate-slide-up">
            <!-- Left Panel -->
            <div class="left-panel">
                <div class="top-quote animate-fade-in" style="animation-delay: 0.3s;">
                    <span class="quote-text">A WISE QUOTE</span>
                    <div class="quote-line"></div>
                </div>
                <div class="bottom-content animate-fade-in" style="animation-delay: 0.5s;">
                    <h1 class="headline">Get<br>Everything<br>You Want</h1>
                    <p class="sub-headline">You can get everything you want if you work hard,<br>trust the process, and stick to the plan.</p>
                </div>
            </div>

            <!-- Right Panel -->
            <div class="right-panel">
                <!-- Theme Toggle -->
                <button class="theme-toggle" aria-label="Toggle Dark Mode" id="themeToggle">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                
                <div class="form-container">
                    <div class="logo animate-fade-in" style="animation-delay: 0.2s;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-icon">
                            <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="2"/>
                            <path d="M7 12C7 9.23858 9.23858 7 12 7C14.7614 7 17 9.23858 17 12C17 14.7614 14.7614 17 12 17" stroke="currentColor" stroke-width="2"/>
                            <path d="M9.5 12C9.5 10.6193 10.6193 9.5 12 9.5C13.3807 9.5 14.5 10.6193 14.5 12" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <span class="logo-text">Cogie</span>
                    </div>

                    <div class="header animate-fade-in" style="animation-delay: 0.3s;">
                        <h2>Welcome Back</h2>
                        <p>Enter your email and password to access your account</p>
                    </div>

                    <form id="loginForm" class="login-form animate-fade-in" style="animation-delay: 0.4s;">
                        
                        <div class="input-group floating-label-group">
                            <input type="email" id="email" placeholder=" " required aria-label="Email Address">
                            <label for="email">Email</label>
                            <span class="error-message" id="emailError" role="alert"></span>
                        </div>

                        <div class="input-group floating-label-group">
                            <div class="password-wrapper">
                                <input type="password" id="password" placeholder=" " required aria-label="Password">
                                <label for="password">Password</label>
                                <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                            <div class="caps-lock-warning" id="capsLockWarning">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                                    <line x1="12" y1="9" x2="12" y2="13"></line>
                                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                </svg>
                                Caps Lock is ON
                            </div>
                            <div class="password-strength" id="passwordStrength">
                                <div class="strength-bar"></div>
                                <div class="strength-bar"></div>
                                <div class="strength-bar"></div>
                            </div>
                            <span class="error-message" id="passwordError" role="alert"></span>
                        </div>

                        <div class="form-actions">
                            <label class="remember-me">
                                <input type="checkbox" name="remember">
                                <span class="checkmark"></span>
                                <span>Remember me</span>
                            </label>
                            <a href="#" class="forgot-password hover-underline-animation">Forgot Password</a>
                        </div>

                        <button type="submit" class="btn-primary" id="submitBtn">
                            <span class="btn-text">Sign In</span>
                            <span class="spinner" style="display: none;"></span>
                        </button>
                        
                        <button type="button" class="btn-google">
                            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                            </svg>
                            Sign In with Google
                        </button>
                    </form>

                    <div class="footer animate-fade-in" style="animation-delay: 0.5s;">
                        Don't have an account? <a href="#" class="hover-underline-animation">Sign Up</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
